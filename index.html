<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kez Media</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
/* ─── TOKENS ────────────────────────────────────────── */
:root{
  --pink:#e2688a; --pink-soft:#f0a0b8; --pink-pale:#fceef3; --pink-glow:rgba(226,104,138,.18);
  --bg:#ffffff; --bg2:#fdf6f8; --bg3:#f5edf1; --card:#ffffff;
  --border:rgba(180,120,145,.14); --text:#1a0d12; --text2:#7a5263; --text3:#b8909e;
  --nav-shadow:0 1px 0 var(--border); --card-shadow:0 2px 14px rgba(180,100,140,.08);
  --nav-bg:rgba(255,255,255,.88);
}
[data-theme="dark"]{
  --bg:#150d10; --bg2:#1e131a; --bg3:#271820; --card:#1c1118;
  --border:rgba(226,104,138,.12); --text:#faeef2; --text2:#c49aaa; --text3:#7a5060;
  --nav-shadow:0 1px 0 var(--border); --card-shadow:0 2px 20px rgba(0,0,0,.3);
  --nav-bg:rgba(21,13,16,.9);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Jost',sans-serif;background:linear-gradient(145deg,#fff0f6 0%,#fde8f2 30%,#fdf3f8 60%,#fce8f0 100%);background-attachment:fixed;color:var(--text);min-height:100vh;transition:background .3s,color .3s;overflow-x:hidden;position:relative;}
[data-theme="dark"] body{background:linear-gradient(145deg,#1a0912 0%,#200e18 35%,#18080f 65%,#1e0d16 100%);background-attachment:fixed;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 0% 0%,rgba(255,150,200,.35) 0%,transparent 65%),radial-gradient(ellipse 50% 40% at 100% 0%,rgba(240,100,170,.28) 0%,transparent 60%),radial-gradient(ellipse 45% 55% at 100% 100%,rgba(255,170,210,.3) 0%,transparent 65%),radial-gradient(ellipse 55% 35% at 0% 100%,rgba(230,110,170,.25) 0%,transparent 60%),radial-gradient(ellipse 35% 40% at 50% 50%,rgba(255,190,220,.15) 0%,transparent 65%);transition:opacity .3s;}
[data-theme="dark"] body::before{background:radial-gradient(ellipse 60% 50% at 0% 0%,rgba(180,30,90,.22) 0%,transparent 65%),radial-gradient(ellipse 50% 40% at 100% 0%,rgba(160,20,80,.18) 0%,transparent 60%),radial-gradient(ellipse 45% 55% at 100% 100%,rgba(190,40,100,.2) 0%,transparent 65%),radial-gradient(ellipse 55% 35% at 0% 100%,rgba(170,25,85,.16) 0%,transparent 60%),radial-gradient(ellipse 35% 40% at 50% 50%,rgba(200,50,110,.1) 0%,transparent 65%);}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

/* ─── NAV ──────────────────────────────────────────── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:58px;background:var(--nav-bg);backdrop-filter:blur(18px);box-shadow:var(--nav-shadow);display:flex;align-items:center;padding:0 28px;gap:14px;transition:background .3s;position:fixed;}
.brand{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;font-style:italic;background:linear-gradient(130deg,#d44f7a 0%,#e8789c 40%,#f4a8c0 70%,#c93f6e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;flex-shrink:0;white-space:nowrap;filter:drop-shadow(0 1px 8px rgba(210,70,120,.18));cursor:pointer;}
.nav-search{flex:1;max-width:280px;position:relative;}
.nav-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:8px 14px 8px 36px;color:var(--text);font-family:'Jost',sans-serif;font-size:13px;outline:none;transition:border-color .2s,background .3s;}
.nav-search input:focus{border-color:var(--pink);}
.nav-search input::placeholder{color:var(--text3);}
.nav-search .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:transparent;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .2s;position:relative;}
.icon-btn:hover{background:var(--pink-pale);border-color:var(--pink);color:var(--pink);}
[data-theme="dark"] .icon-btn:hover{background:var(--bg3);}
.badge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;background:var(--pink);border-radius:50%;font-size:9px;font-weight:700;color:white;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}
.badge.hidden{display:none;}
.theme-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .2s;}
.theme-btn:hover{border-color:var(--pink);color:var(--pink);}
.nav-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--pink-soft));display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:white;cursor:pointer;border:2px solid transparent;transition:border-color .2s;overflow:hidden;}
.nav-avatar:hover{border-color:var(--pink);}
.nav-avatar img{width:100%;height:100%;object-fit:cover;}

/* ─── LAYOUT ───────────────────────────────────────── */
.layout{display:grid;grid-template-columns:220px 1fr 290px;gap:24px;max-width:1100px;margin:0 auto;padding:calc(58px + 26px) 16px 48px;align-items:start;position:relative;z-index:1;transition:grid-template-columns .35s ease;}
/* when profile is active, collapse right sidebar and expand center */
.layout.profile-mode{grid-template-columns:220px 1fr;}
.layout.profile-mode .sidebar-right{display:none;}

/* ─── SIDEBAR LEFT ─────────────────────────────────── */
